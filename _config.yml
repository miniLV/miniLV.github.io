title: miniLV
SEOTitle: miniLV Blog
description: "iOS、架构、产品感觉和长期主义的技术笔记。"
email: liangyuhangApple@gmail.com
url: "https://minilv.github.io"
baseurl: ""
language: "zh-CN"
timezone: "Asia/Shanghai"

permalink: pretty
paginate: 8
paginate_path: "/page/:num/"
plugins:
  - jekyll-paginate

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - README.zh.md
  - .claude
  - vendor

default_eyebrow: "miniLV Notes"
hero_title: "写给长期主义者的技术笔记"
hero_description: "关于 iOS、架构、产品感觉和真实开发现场的文章集合。继续写 Markdown，渲染和发布交给 Jekyll 与 GitHub Pages。"
hero_primary_cta:
  label: "Read latest"
  url: "#latest-posts"
hero_secondary_cta:
  label: "Browse tags"
  url: "/tags/"

nav_items:
  - title: "首页"
    url: "/"
  - title: "标签"
    url: "/tags/"
  - title: "GitHub"
    url: "https://github.com/miniLV"

social_links:
  - title: "GitHub"
    label: "github"
    url: "https://github.com/miniLV"
  - title: "掘金"
    label: "juejin"
    url: "https://juejin.cn/user/5a0a82ac6fb9a04515436530"
  - title: "简书"
