<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 992" role="img" aria-labelledby="title desc">
  <title id="title">ScrollView flow diagram</title>
  <desc id="desc">The original flow diagram with added directional arrows for the main branches and loops.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6f747f"/>
    </marker>
    <style>
      .flow {
        fill: none;
        stroke: #6f747f;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
        opacity: 0.96;
      }
      .arrowhead {
        fill: #6f747f;
        opacity: 0.96;
      }
    </style>
  </defs>

  <image href="tableview-scrollview-flow-base.png" x="0" y="0" width="1240" height="992"/>

  <path class="flow" d="M 320 110 H 364"/>
  <path class="flow" d="M 968 840 H 888"/>
  <path class="flow" d="M 860 916 H 808"/>
  <path class="flow" d="M 622 884 V 901"/>
</svg>
